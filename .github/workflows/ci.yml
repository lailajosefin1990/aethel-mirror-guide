name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --exclude='src/test/oauth-roundtrip.test.tsx'
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build
        run: npm run build
