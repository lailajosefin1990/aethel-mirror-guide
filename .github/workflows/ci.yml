name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx vitest run --coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build
        run: npm run build

  navigation-guard:
    name: Navigation Sync Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            navigation:
              - 'src/hooks/useFlowNavigation.ts'
              - 'src/pages/Index.tsx'
              - 'src/context/appReducer.ts'
              - 'src/App.tsx'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.navigation == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.navigation == 'true'
        run: npm install --legacy-peer-deps

      - name: Run navigation sync guard tests
        if: steps.changes.outputs.navigation == 'true'
        run: |
          echo "🔒 Navigation files changed — running sync guard + hook integration tests"
          npx vitest run src/test/flow-navigation-sync.test.tsx src/test/hooks-integration.test.tsx --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Skip — no navigation files changed
        if: steps.changes.outputs.navigation != 'true'
        run: echo "✅ No navigation files changed — guard tests skipped"

  contrast-guard:
    name: Contrast Regression Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run contrast regression tests
        run: |
          echo "🎨 Checking text contrast, monochrome palette, and muted-foreground lightness"
          npx vitest run src/test/contrast-regression.test.ts --reporter=verbose


  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Skip deploy — no VERCEL_TOKEN
        if: env.VERCEL_TOKEN == ''
        run: echo "⚠️ VERCEL_TOKEN not set — skipping deploy. Add it in repo Settings → Secrets."
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
